name: Bug
description: Report a bug — locked SOP 5-section format (form output is auto-normalized to ## headings after submission)
title: "[<Page>] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to file a bug. Plain English in every field except **Technical Requirement** (where short technical terms in parens are fine). The output will be auto-normalized to the SOP 5-section shape after you submit.

  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: 4-6 lines, plain English, why it matters to the user.
      placeholder: On the live site, the X screen shows ... so staff cannot ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Repro / Steps
      description: Numbered steps to reproduce.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs Actual
      description: One line each.
      placeholder: |
        - **Expected:** ...
        - **Actual:** ...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - low
        - med
        - high
    validations:
      required: true

  - type: dropdown
    id: env
    attributes:
      label: Env
      options:
        - prod
        - staging
        - local
    validations:
      required: true

  - type: input
    id: browser-device
    attributes:
      label: Browser/Device
      placeholder: e.g., desktop Chrome / iPhone Safari
    validations:
      required: false

  - type: input
    id: related-logs
    attributes:
      label: Related logs
      description: Optional — link to a Troubleshooting log entry.
    validations:
      required: false

  - type: textarea
    id: technical-requirement
    attributes:
      label: Technical Requirement
      description: Bold business outcome — plain English with key technical term in parens or backticks.
      placeholder: |
        - **<outcome>** — <plain English> (`technical term`).
    validations:
      required: false
